version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: rajpal-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: rajpal-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/kitchen-utensils
      - PORT=5000
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
    container_name: rajpal-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
